<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HomePlate — Dashboard</title>
  <link rel="stylesheet" href="ds.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { overflow: hidden; }
    /* Gradient text — ensure cross-browser */
    .grad-text {
      background: linear-gradient(90deg, var(--orange), var(--yellow), var(--lime), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Thin scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ds-foodicons.jsx"></script>
  <script type="text/babel" src="ds-logo.jsx"></script>
  <script type="text/babel" src="dash-widgets.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
</body>
</html>
