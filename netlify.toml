[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command    = "npm run dev"
  targetPort = 5173
  port       = 8888

[functions."consolidate-pantry"]
  timeout = 15

[functions."parse-recipe"]
  timeout = 26

[functions."generate-store-layout"]
  timeout = 20

[functions."parse-aisle-photo"]
  timeout = 20

[[context.production.redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
