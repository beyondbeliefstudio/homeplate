<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4F6EE" />
    <title>HomePlate</title>
    <script>
      // Apply .dark before React hydrates to prevent flash.
      // Light is now the default — no class needed for light mode.
      (function() {
        var theme = localStorage.getItem('hp-theme');
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
