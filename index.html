<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0F0F" />
    <title>HomePlate</title>
    <script>
      // Apply dark/light class before React hydrates to prevent flash
      (function() {
        var theme = localStorage.getItem('hp-theme');
        if (theme === 'light') document.documentElement.classList.add('light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
